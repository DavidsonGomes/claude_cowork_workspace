<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Saúde</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="data/health-data.js"></script>
  <style>
    :root {
      --bg:#080e1c; --surface:#0f1929; --s2:#152236; --s3:#1a2d45;
      --border:#1e2d45; --text:#e2e8f0; --muted:#64748b;
      --green:#34d399; --amber:#fbbf24; --red:#f87171;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;}

    /* ── NAV ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
    .topbar h1{font-size:15px;font-weight:600;}
    .sub{font-size:12px;color:var(--muted);margin-top:1px;}
    .tabs{display:flex;gap:4px;}
    .tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);transition:all .15s;}
    .tab:hover{color:var(--text);background:var(--s2);}
    .tab.active{color:var(--text);background:var(--s2);border-color:var(--border);}

    /* ── LAYOUT ── */
    .page{max-width:1400px;margin:0 auto;padding:24px 20px;}
    .view{display:none;}.view.active{display:block;}
    .sec{margin-bottom:28px;}
    .sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

    /* ── CARDS ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
    .p-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .p-head h2{font-size:14px;font-weight:600;}

    /* ── KPIs ── */
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
    .kpi .lbl{font-size:11px;color:var(--muted);margin-bottom:3px;}
    .kpi .val{font-size:22px;font-weight:700;}
    .kpi .dlt{font-size:11px;margin-top:2px;}
    .good{color:var(--green);}.bad{color:var(--red);}.neutral{color:var(--muted);}

    /* ── PROGRESS ── */
    .prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;}
    .prog-track{height:8px;background:var(--border);border-radius:99px;position:relative;}
    .prog-fill{height:100%;border-radius:99px;transition:width .4s;}
    .prog-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:3px;height:14px;border-radius:2px;background:var(--amber);}
    .prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;}
    .pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
    .pill{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 10px;border-radius:99px;background:var(--border);color:var(--muted);}
    .pill.good{background:rgba(52,211,153,.1);color:var(--green);}
    .pill.bad{background:rgba(248,113,113,.1);color:var(--red);}

    /* ── GOAL CONFIG ── */
    .goal-config{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .goal-config-toggle{font-size:12px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
    .goal-config-toggle:hover{color:var(--text);}
    .goal-config-body{display:none;margin-top:10px;}
    .goal-config-body.open{display:block;}
    .goal-frow{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;}
    .goal-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
    .goal-field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:13px;outline:none;}
    .goal-field input:focus{border-color:#38bdf8;}
    .goal-note{font-size:11px;color:var(--muted);margin-top:6px;}

    /* ── CHARTS ── */
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
    .chart-title{font-size:13px;font-weight:600;margin-bottom:12px;}
    .chart-wrap{position:relative;height:190px;}

    /* ── TABLE ── */
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;font-size:11px;font-weight:500;color:var(--muted);padding:5px 8px;}
    td{padding:6px 8px;font-size:13px;border-top:1px solid var(--border);}
    .badge{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:500;}
    .delta-dn{color:var(--green);}.delta-up{color:var(--red);}

    /* ── CHECKIN DISPLAY ── */
    .ci-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .ci-row:last-child{border-bottom:none;}
    .sym-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;margin:2px;border:1px solid var(--border);color:var(--muted);}
    .sym-tag.ok{color:var(--green);border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.06);}
    .sym-tag.warn{color:var(--amber);border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.06);}

    /* ── HISTÓRICO ── */
    .hist-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
    .hist-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background .15s;}
    .hist-header:hover{background:var(--s2);}
    .hist-title{display:flex;align-items:center;gap:10px;}
    .hist-title h3{font-size:14px;font-weight:600;}
    .hist-week{font-size:12px;color:var(--muted);}
    .hist-status{display:flex;gap:6px;}
    .status-dot{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:99px;}
    .status-dot.full{background:rgba(52,211,153,.1);color:var(--green);}
    .status-dot.partial{background:rgba(251,191,36,.1);color:var(--amber);}
    .status-dot.empty{background:rgba(248,113,113,.1);color:var(--red);}
    .hist-metrics{display:flex;gap:16px;font-size:12px;}
    .hist-metric{display:flex;flex-direction:column;gap:2px;}
    .hist-metric .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;}
    .hist-metric .val{font-weight:600;}
    .hist-metric .val.missing{color:var(--amber);}
    .hist-body{display:none;border-top:1px solid var(--border);}
    .hist-body.open{display:block;}
    .hist-body-inner{padding:16px;}
    .hist-person-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .chevron{font-size:12px;color:var(--muted);transition:transform .2s;}
    .chevron.open{transform:rotate(180deg);}

    /* ── FORM ── */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
    .form-card h3{font-size:14px;font-weight:600;margin-bottom:14px;}
    .field{margin-bottom:12px;}
    .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
    .field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
    .field input:focus,.field select:focus{border-color:#38bdf8;}
    .field input.missing-val{border-color:var(--amber);}
    .field textarea{resize:vertical;min-height:54px;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .sym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .divider{height:1px;background:var(--border);margin:12px 0;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
    .btn-p{background:#38bdf8;color:#000;}.btn-p:hover{opacity:.9;}
    .btn-s{background:var(--s2);color:var(--text);border:1px solid var(--border);}.btn-s:hover{border-color:#38bdf8;color:#38bdf8;}
    .btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
    .form-actions{display:flex;gap:10px;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
    .form-hint{font-size:12px;color:var(--muted);background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:16px;line-height:1.6;}
    .json-out{background:#0a1526;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto;color:#94a3b8;margin-top:12px;display:none;}
    .copy-btn{font-size:11px;padding:4px 10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);}
    .copy-btn:hover{color:var(--text);}

    /* ── TABLE SCROLL WRAPPER ── */
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

    /* ── RESPONSIVE: TABLET (max 900px) ── */
    @media(max-width:900px){
      .g2,.form-grid,.hist-person-row{grid-template-columns:1fr;}
      .g4{grid-template-columns:repeat(2,1fr);}
      .topbar{flex-direction:column;gap:10px;align-items:flex-start;}
      .tabs{flex-wrap:wrap;gap:4px;}
      .tab{padding:7px 12px;font-size:12px;}
      .hist-header{flex-direction:column;align-items:flex-start;gap:8px;}
      .hist-status{flex-wrap:wrap;}
      .hist-metrics{flex-wrap:wrap;}
      .ci-row{font-size:12px;gap:8px;}
      .ci-row span:last-child{text-align:right;max-width:60%;}
      /* Exam edit grid rows — 5-col inline grids */
      [style*="grid-template-columns:2fr 1fr 1fr 1.2fr auto"]{
        grid-template-columns:1fr 1fr!important;
      }
      /* Prescription edit grid — 5-col */
      [style*="grid-template-columns:2fr 1fr 2fr 1fr auto"]{
        grid-template-columns:1fr 1fr!important;
      }
      /* Alert edit grid — 4-col */
      [style*="grid-template-columns:auto 3fr 1fr auto"]{
        grid-template-columns:1fr 1fr!important;
      }
      /* Upcoming edit grid — 4-col */
      [style*="grid-template-columns:2fr 1fr 1fr auto"]{
        grid-template-columns:1fr 1fr!important;
      }
      .goal-frow{grid-template-columns:1fr 1fr auto;}
      .sym-grid{grid-template-columns:repeat(2,1fr);}
      /* Inline symptom grids in hist edit */
      [style*="grid-template-columns:repeat(3,1fr)"]{
        grid-template-columns:repeat(2,1fr)!important;
      }
    }

    /* ── RESPONSIVE: PHONE (max 600px) ── */
    @media(max-width:600px){
      body{font-size:13px;}
      .page{padding:16px 12px;}
      .topbar{padding:10px 14px;}
      .topbar h1{font-size:13px;}
      .sub{font-size:11px;}
      .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;width:100%;padding-bottom:4px;gap:4px;}
      .tab{padding:8px 12px;font-size:12px;white-space:nowrap;flex-shrink:0;min-height:44px;display:inline-flex;align-items:center;}
      .g4{grid-template-columns:1fr!important;}
      .g2{gap:12px;}
      .kpi{padding:10px 12px;}
      .kpi .val{font-size:18px;}
      .kpi .lbl{font-size:10px;}
      .card{padding:12px;border-radius:10px;}
      .chart-card{padding:12px;border-radius:10px;}
      .chart-wrap{height:160px;}
      .sec-title{font-size:10px;}
      .sec{margin-bottom:20px;}

      /* Forms single column */
      .frow{grid-template-columns:1fr!important;}
      .goal-frow{grid-template-columns:1fr!important;}
      .sym-grid{grid-template-columns:1fr 1fr!important;}
      [style*="grid-template-columns:repeat(3,1fr)"]{
        grid-template-columns:1fr!important;
      }

      /* Tables scroll */
      table{min-width:500px;}
      th{font-size:10px;padding:4px 6px;}
      td{font-size:12px;padding:5px 6px;}

      /* Exam edit grid rows — stack on phone */
      [style*="grid-template-columns:2fr 1fr 1fr 1.2fr auto"]{
        grid-template-columns:1fr!important;
      }
      [style*="grid-template-columns:2fr 1fr 2fr 1fr auto"]{
        grid-template-columns:1fr!important;
      }
      [style*="grid-template-columns:auto 3fr 1fr auto"]{
        grid-template-columns:1fr!important;
      }
      [style*="grid-template-columns:2fr 1fr 1fr auto"]{
        grid-template-columns:1fr!important;
      }

      /* Histórico cards */
      .hist-header{padding:10px 12px;}
      .hist-title h3{font-size:13px;}
      .hist-week{font-size:11px;}
      .hist-body-inner{padding:12px;}
      .status-dot{font-size:10px;padding:2px 6px;}
      .form-card{padding:12px;}
      .form-card h3{font-size:13px;}
      .form-actions{flex-wrap:wrap;gap:8px;}

      /* Progress bar */
      .prog-top{font-size:11px;flex-direction:column;gap:2px;}
      .prog-labels{font-size:9px;}

      /* Pills and badges */
      .pills{gap:4px;}
      .pill{font-size:11px;padding:3px 8px;}
      .badge{font-size:10px;padding:1px 6px;}

      /* Buttons — touch target minimum 44px */
      .btn{min-height:44px;padding:10px 16px;font-size:13px;}
      .btn-sm{min-height:40px;padding:8px 12px;font-size:12px;}
      .copy-btn{min-height:40px;padding:6px 10px;font-size:11px;}

      /* JSON output */
      .json-out{font-size:10px;padding:10px;max-height:200px;}

      /* Form hints */
      .form-hint{font-size:11px;padding:8px 10px;}

      /* Check-in display rows */
      .ci-row{flex-direction:column;gap:2px;padding:8px 0;}
      .ci-row span:last-child{text-align:left;max-width:100%;}

      /* Goal config */
      .goal-config-toggle{font-size:11px;}
      .goal-note{font-size:10px;}

      /* Upcoming exam items */
      [style*="display:flex;align-items:center;gap:10px;padding:8px 12px"]{
        flex-direction:column!important;align-items:flex-start!important;
      }

      /* Casal view summary rows */
      .ci-row span[style*="max-width:60%"]{max-width:100%!important;text-align:left!important;}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div><h1>Dashboard Saúde — Davidson &amp; Isabella</h1><div class="sub" id="hdrSub"></div></div>
  <div class="tabs" id="tabBar"></div>
</div>

<div id="view-davidson" class="view page"></div>
<div id="view-isabella" class="view page"></div>
<div id="view-casal"    class="view page"></div>
<div id="view-historico" class="view page"></div>
<div id="view-checkin"   class="view page"></div>
<div id="view-exames"    class="view page"></div>

<script>
// ── PERSISTÊNCIA DE METAS (localStorage) ─────────────────────────────────────
(function loadSavedGoals(){
  try {
    const saved = JSON.parse(localStorage.getItem('hd_goals') || '{}');
    for(const pid in saved){
      if(HEALTH_DATA.pessoas[pid]) Object.assign(HEALTH_DATA.pessoas[pid].goals, saved[pid]);
    }
  } catch(e){}
})();

// ── SERVIDOR LOCAL — auto-save ────────────────────────────────────────────────
const IS_SERVER = location.protocol === 'http:';
async function autoSave(data) {
  if (!IS_SERVER) return false;
  try {
    const r = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await r.json();
    return result.ok === true;
  } catch(e) { return false; }
}
function showSaveResult(elId, ok, fallbackJson) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (ok) {
    el.textContent = '✅ Salvo com sucesso! Recarregando...';
    el.style.display = 'block'; el.style.color = 'var(--green)';
    el.style.fontFamily = 'inherit'; el.style.fontSize = '13px';
    el.style.whiteSpace = 'normal';
    setTimeout(() => location.reload(), 1400);
  } else {
    el.textContent = fallbackJson;
    el.style.display = 'block'; el.style.color = '#94a3b8';
    el.style.fontFamily = 'monospace'; el.style.fontSize = '11px';
    el.style.whiteSpace = 'pre-wrap';
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fd = d => { const [y,m,dd]=d.split("-"); return `${dd}/${m}/${y}`; };
const lastVal = (arr, key) => { for(let i=arr.length-1;i>=0;i--) if(arr[i][key]!=null) return arr[i][key]; return null; };
const diffStr = (cur, base, inv=false) => {
  if(cur==null||base==null) return {txt:"—",cls:"neutral"};
  const d=(cur-base).toFixed(1);
  return {txt:(d>0?"+":"")+d, cls:(inv?d>0:d<0)?"good":"bad"};
};
const tCls = (v, isGoodUp=false) => v==="↓"?(isGoodUp?"bad":"good"):v==="↑"?(isGoodUp?"good":"bad"):"neutral";

const CD = {
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{x:{ticks:{color:"#64748b",font:{size:10},maxTicksLimit:9},grid:{color:"#1e2d45"}},
          y:{ticks:{color:"#64748b",font:{size:10}},grid:{color:"#1e2d45"}}}
};
function mkLine(id,labels,datasets,legend=false){
  const o=JSON.parse(JSON.stringify(CD));
  if(legend)o.plugins.legend={display:true,labels:{color:"#94a3b8",font:{size:11}}};
  new Chart(document.getElementById(id),{type:"line",data:{labels,datasets},
    options:{...o,elements:{point:{radius:3},line:{tension:.35}}}});
}

function copyText(txt, btn){
  navigator.clipboard.writeText(txt).then(()=>{
    const t=btn.textContent;btn.textContent="Copiado ✓";setTimeout(()=>btn.textContent=t,2000);
  });
}

// ── GOAL CONFIG widget ─────────────────────────────────────────────────────────
function goalConfigHTML(pid) {
  const p = HEALTH_DATA.pessoas[pid];
  const g = p.goals;
  return `
    <div class="goal-config">
      <div class="goal-config-toggle" onclick="toggleGoalConfig('${pid}')">
        ⚙️ Configurar metas
      </div>
      <div class="goal-config-body" id="goal-body-${pid}">
        <div class="goal-frow" style="margin-top:8px">
          <div class="goal-field">
            <label>Meta principal (gordura %)</label>
            <input type="number" step="0.5" id="goal-target-${pid}" value="${g.fat_pct_target??''}" placeholder="ex: 15"/>
          </div>
          <div class="goal-field">
            <label>Meta intermediária (opcional)</label>
            <input type="number" step="0.5" id="goal-mid-${pid}" value="${g.fat_pct_intermediate??''}" placeholder="ex: 20"/>
          </div>
          <button class="btn btn-s btn-sm" onclick="applyGoal('${pid}')">Aplicar</button>
        </div>
        <div class="goal-note">Após ajustar, clique em Aplicar para atualizar a barra. Copie o JSON gerado para salvar.</div>
        <pre class="json-out" id="goal-json-${pid}"></pre>
      </div>
    </div>`;
}

function toggleGoalConfig(pid){
  const el=document.getElementById(`goal-body-${pid}`);
  el.classList.toggle("open");
}

function applyGoal(pid){
  const t=parseFloat(document.getElementById(`goal-target-${pid}`).value)||null;
  const m=parseFloat(document.getElementById(`goal-mid-${pid}`).value)||null;
  HEALTH_DATA.pessoas[pid].goals.fat_pct_target=t;
  HEALTH_DATA.pessoas[pid].goals.fat_pct_intermediate=m;
  updateProgressBar(pid);
  // Persistir no localStorage (sobrevive ao refresh da página)
  try {
    const saved=JSON.parse(localStorage.getItem('hd_goals')||'{}');
    saved[pid]={fat_pct_target:t,fat_pct_intermediate:m};
    localStorage.setItem('hd_goals',JSON.stringify(saved));
  } catch(e){}
  const el=document.getElementById(`goal-json-${pid}`);
  el.textContent=`✅ Meta salva! (fat_pct_target: ${t??'—'}%, intermediária: ${m??'nenhuma'})`;
  el.style.display="block";el.style.color="var(--green)";el.style.fontFamily="inherit";el.style.fontSize="12px";
}

function updateProgressBar(pid){
  const p=HEALTH_DATA.pessoas[pid];
  const g=p.goals;
  const cf=lastVal(p.history,"fat_pct");
  const b=p.baseline;
  if(cf==null||!g.fat_pct_target) return;
  const range=b.fat_pct-g.fat_pct_target;
  const pct=Math.min(100,Math.max(0,((b.fat_pct-cf)/range)*100));
  const bar=document.getElementById(`prog-bar-${pid}`);
  if(bar) bar.style.width=pct+"%";
  const lbl=document.getElementById(`prog-lbl-${pid}`);
  if(lbl) lbl.textContent=`Atual: ${cf}% → Meta: ${g.fat_pct_target}%`;
  const mid=document.getElementById(`prog-mid-${pid}`);
  if(mid){
    if(g.fat_pct_intermediate){
      const mp=((b.fat_pct-g.fat_pct_intermediate)/range)*100;
      mid.style.left=mp+"%";mid.style.display="block";
    } else {
      mid.style.display="none";
    }
  }
  const ll=document.getElementById(`prog-labels-${pid}`);
  if(ll) ll.innerHTML=`<span>${b.fat_pct}% (início)</span>${g.fat_pct_intermediate?`<span>${g.fat_pct_intermediate}% (interm.)</span>`:"<span></span>"}<span>${g.fat_pct_target??'?'}% (meta)</span>`;
}

// ── RESUMO DE EXAMES (para view principal) ──────��────────────────────────────
function buildPersonExamsSummary(pid){
  const E=HEALTH_DATA.exams||{}, A=HEALTH_DATA.clinical_alerts||{}, U=HEALTH_DATA.upcoming_exams||{}, P=HEALTH_DATA.prescriptions||{};
  const p=HEALTH_DATA.pessoas[pid];
  const exams=E[pid]||[], alerts=A[pid]||[], upcoming=U[pid]||[], prescr=P[pid]||[];

  if(!exams.length && !alerts.length && !upcoming.length && !prescr.length) return "";

  const lastExam=exams.length?exams[exams.length-1]:null;
  const warnResults=lastExam?lastExam.results.filter(r=>r.status==="warn"):[];

  // Evolução de marcadores entre exames (marcadores em comum com valor numérico)
  let evoHTML="";
  if(exams.length>=2){
    const keyMarkers=["Testosterona total","FSH","LH","Creatinina","eGFR (CKD-EPI)","HbA1c","Colesterol total","LDL (calculado)","HDL","Triglicérides","Vitamina D (25-OH)","Vitamina B12","Ferritina","HOMA-IR","Glicose jejum","Insulina","TSH","T4 livre","TGO (AST)","TGP (ALT)"];
    // Build map: marker -> [{date, value}]
    const markerMap={};
    exams.forEach(ex=>{
      ex.results.forEach(r=>{
        if(typeof r.value!=="number") return;
        if(!markerMap[r.name]) markerMap[r.name]=[];
        markerMap[r.name].push({date:ex.date,value:r.value,unit:r.unit,status:r.status});
      });
    });
    // Filter to markers that appear in 2+ exams
    const evolved=keyMarkers.filter(m=>markerMap[m]&&markerMap[m].length>=2);
    if(evolved.length){
      evoHTML=`
        <div style="margin-bottom:12px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase">Evolução entre exames</div>
          <div class="table-scroll"><table style="width:100%;min-width:500px">
            <thead><tr><th style="text-align:left">Marcador</th>${exams.map(ex=>`<th style="text-align:right;font-size:10px">${fd(ex.date)}</th>`).join("")}<th style="text-align:right">Δ</th></tr></thead>
            <tbody>${evolved.map(m=>{
              const pts=markerMap[m];
              const first=pts[0], last=pts[pts.length-1];
              const d=(last.value-first.value);
              const pct=first.value!==0?((d/first.value)*100).toFixed(0):"";
              const isGoodDown=["Creatinina","HbA1c","Colesterol total","LDL (calculado)","Triglicérides","HOMA-IR","Insulina","Glicose jejum","TSH","TGO (AST)","TGP (ALT)"].includes(m);
              const isGoodUp=["Testosterona total","FSH","LH","HDL","Vitamina D (25-OH)","Vitamina B12","Ferritina","eGFR (CKD-EPI)","T4 livre"].includes(m);
              const cls=d===0?"neutral":((isGoodUp&&d>0)||(isGoodDown&&d<0))?"good":"bad";
              // Build cells for each exam
              const cells=exams.map(ex=>{
                const found=pts.find(p=>p.date===ex.date);
                return `<td style="text-align:right;font-size:12px;${found?.status==='warn'?'color:var(--red)':''}">${found?found.value:"—"}</td>`;
              }).join("");
              return `<tr>
                <td style="font-size:12px;font-weight:500">${m} <span style="color:var(--muted);font-size:10px">${first.unit}</span></td>
                ${cells}
                <td style="text-align:right"><span class="${cls}" style="font-size:11px;font-weight:600">${d>0?"+":""}${d.toFixed(1)}${pct?` (${pct}%)`:""}</span></td>
              </tr>`;
            }).join("")}</tbody>
          </table></div>
        </div>`;
    }
  }

  return `
    <div class="sec">
      <div class="sec-title">Saúde — Exames e prescrições</div>
      <div class="card" style="border-color:${p.colorDim}">
        ${upcoming.length?`
          <div style="margin-bottom:12px">
            ${upcoming.map(u=>`
              <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:8px;margin-bottom:4px;font-size:12px">
                <span>📅</span>
                <span style="font-weight:600">${u.exam}</span>
                <span style="color:var(--muted)">· ${u.window}</span>
                <span class="pill bad" style="margin-left:auto;font-size:10px">${u.status}</span>
              </div>`).join("")}
          </div>`:""}

        ${alerts.length?`
          <div style="margin-bottom:12px">
            ${alerts.map(a=>`
              <div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0">
                <span style="color:${a.type==="action"?"var(--amber)":"var(--red)"}">${a.type==="action"?"🔔":"⚠️"}</span>
                <span>${a.text}</span>
              </div>`).join("")}
          </div>`:""}

        ${evoHTML}

        ${lastExam&&!evoHTML?`
          <div style="margin-bottom:12px">
            <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Último exame: <strong style="color:var(--text)">${lastExam.label}</strong> · ${fd(lastExam.date)}</div>
            ${warnResults.length?`
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${warnResults.map(r=>`<span class="pill bad" style="font-size:11px">${r.name}: ${r.value} ${r.unit}</span>`).join("")}
              </div>`:`<span class="pill good" style="font-size:11px">Todos os marcadores OK</span>`}
          </div>`:""}

        ${prescr.length?`
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Prescrições ativas</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${prescr.map(r=>`<span class="pill" style="font-size:11px">${r.name} ${r.dose}</span>`).join("")}
            </div>
          </div>`:""}

        <div style="margin-top:10px;text-align:right">
          <span style="font-size:11px;color:var(--muted);cursor:pointer" onclick="setTab('exames')">Ver detalhes →</span>
        </div>
      </div>
    </div>`;
}

// ── PERSON VIEW ───────────────────────────────────────────────────────────────
function buildPersonView(pid){
  const p=HEALTH_DATA.pessoas[pid],c=p.color;
  const lastCI=HEALTH_DATA.checkins[HEALTH_DATA.checkins.length-1];
  const pCI=lastCI[pid];
  const b=p.baseline,g=p.goals;
  const cw=lastVal(p.history,"weight_kg"),cf=lastVal(p.history,"fat_pct"),
        cm=lastVal(p.history,"skeletal_muscle_pct"),cv=lastVal(p.history,"visceral");
  const rw=diffStr(cw,b.weight_kg),rf=diffStr(cf,b.fat_pct),rm=diffStr(cm,b.skeletal_muscle_pct,true),rv=diffStr(cv,b.visceral);

  const range=b.fat_pct-(g.fat_pct_target??15);
  const prog=cf!=null?Math.min(100,Math.max(0,((b.fat_pct-cf)/range)*100)):0;
  const midPct=g.fat_pct_intermediate?((b.fat_pct-g.fat_pct_intermediate)/range)*100:null;
  const midMarker=midPct!=null?`<div class="prog-marker" id="prog-mid-${pid}" style="left:${midPct}%"></div>`:`<div class="prog-marker" id="prog-mid-${pid}" style="display:none"></div>`;
  const midLbl=g.fat_pct_intermediate?`<span>${g.fat_pct_intermediate}% (interm.)</span>`:"<span></span>";

  const tr=pCI.trend;
  const pills=[["Peso",tr.weight,false],["Gordura",tr.fat,false],["Músculo",tr.muscle,true],["Visceral",tr.visceral,false]]
    .map(([l,v,inv])=>`<span class="pill ${tCls(v,inv)}">${l} ${v}</span>`).join("");

  const mFields=["cintura","peito","bracos","ombros","quadril","coxas","panturrilhas"];
  const medsRows=p.measurements.map((r,i)=>{
    const prev=i>0?p.measurements[i-1]:null;
    return `<tr><td><span class="badge" style="background:${p.colorDim};color:${c}">${fd(r.date)}</span></td>`+
      mFields.map(f=>{
        const v=r[f],pp=prev?prev[f]:null;
        if(v==null)return"<td>—</td>";
        if(pp!=null&&v!==pp){const d=v-pp;return`<td>${v} <small class="${d<0?"delta-dn":"delta-up"}">(${d>0?"+":""}${d})</small></td>`;}
        return`<td>${v}</td>`;
      }).join("")+"</tr>";
  }).join("");

  const sc=pCI.scale,ad=pCI.adherence;
  const ciRows=[
    ["Peso",sc.weight_kg!=null?sc.weight_kg+" kg":"—"],
    ["Gordura",sc.fat_pct!=null?sc.fat_pct+"%":"—"],
    [p.muscle_label||"Músculo",sc.skeletal_muscle_pct!=null?sc.skeletal_muscle_pct+"%":"—"],
    ["Visceral",sc.visceral??"—"],
    ["Dieta",ad.diet_score!=null?ad.diet_score+"/10":"—"],
    ["Treinos",ad.workouts_count??"—"],
  ];
  if(p.treatment) ciRows.splice(3,0,["Medicação",ad.medication_on_time?"✓ Em dia":ad.medication_on_time===false?"✗ Atrasou":"—"]);
  const ciHtml=ciRows.map(([l,v])=>`<div class="ci-row"><span>${l}</span><strong>${v}</strong></div>`).join("")+
    (ad.notes?`<p style="font-size:12px;color:#94a3b8;margin-top:8px">${ad.notes}</p>`:"")+
    `<div style="margin-top:10px">${Object.entries(pCI.symptoms).map(([k,v])=>{
      const label=p.symptoms_schema[k]||k;
      return`<span class="sym-tag ${v===0?"ok":v>0?"warn":""}">${label}: ${v??"-"}</span>`;
    }).join("")}</div>`;

  document.getElementById(`view-${pid}`).innerHTML=`
    <div class="sec">
      <div class="sec-title">Indicadores — ${p.nome}</div>
      <div class="g4">
        <div class="kpi"><div class="lbl">Peso atual</div><div class="val" style="color:${c}">${cw!=null?cw+" kg":"—"}</div><div class="dlt"><span class="${rw.cls}">baseline ${rw.txt} kg</span></div></div>
        <div class="kpi"><div class="lbl">Gordura corporal</div><div class="val" style="color:${c}">${cf!=null?cf+"%":"—"}</div><div class="dlt"><span class="${rf.cls}">baseline ${rf.txt}%</span></div></div>
        <div class="kpi"><div class="lbl">${p.muscle_label||"Músculo"}</div><div class="val" style="color:${c}">${cm!=null?cm+"%":"—"}</div><div class="dlt"><span class="${rm.cls}">baseline ${rm.txt}%</span></div></div>
        <div class="kpi"><div class="lbl">Gordura visceral</div><div class="val" style="color:${c}">${cv??"—"}</div><div class="dlt"><span class="${rv.cls}">baseline ${rv.txt}</span></div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Meta — Gordura corporal</div>
      <div class="card" style="border-color:${p.colorDim}">
        <div class="prog-top"><span>Baseline ${b.fat_pct}%</span><span id="prog-lbl-${pid}">${cf!=null?`Atual: ${cf}% → Meta: ${g.fat_pct_target??'?'}%`:"—"}</span></div>
        <div class="prog-track">
          <div class="prog-fill" id="prog-bar-${pid}" style="width:${prog}%;background:${c}"></div>
          ${midMarker}
        </div>
        <div class="prog-labels" id="prog-labels-${pid}"><span>${b.fat_pct}% (início)</span>${midLbl}<span>${g.fat_pct_target??'?'}% (meta)</span></div>
        <div class="pills">${pills}</div>
        ${goalConfigHTML(pid)}
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Evolução — ${p.history.length} medições</div>
      <div class="g2">
        <div class="chart-card"><div class="chart-title">Peso (kg)</div><div class="chart-wrap"><canvas id="ch-w-${pid}"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Composição corporal (%)</div><div class="chart-wrap"><canvas id="ch-c-${pid}"></canvas></div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Medidas corporais (cm) — ${p.measurements.length} registros</div>
      <div class="card" style="border-color:${p.colorDim}">
        <div class="table-scroll"><table><thead><tr><th>Data</th><th>Cintura</th><th>Peito</th><th>Braços</th><th>Ombros</th><th>Quadril</th><th>Coxas</th><th>Pant.</th></tr></thead>
        <tbody>${medsRows}</tbody></table></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Último check-in — Semana ${lastCI.week_number} · ${fd(lastCI.date)}</div>
      <div class="card" style="border-color:${p.colorDim}">${ciHtml}</div>
    </div>

    ${buildPersonExamsSummary(pid)}
  `;

  const h=p.history;
  mkLine(`ch-w-${pid}`,h.map(d=>fd(d.date)),[{data:h.map(d=>d.weight_kg),borderColor:c,backgroundColor:p.colorDim,fill:true,borderWidth:2}]);
  const hc=h.filter(d=>d.fat_pct!=null);
  mkLine(`ch-c-${pid}`,hc.map(d=>fd(d.date)),[
    {label:"Gordura %",data:hc.map(d=>d.fat_pct),borderColor:c,borderWidth:2},
    {label:`${p.muscle_label} %`,data:hc.map(d=>d.skeletal_muscle_pct),borderColor:"#34d399",borderWidth:2,borderDash:[4,3]}
  ],true);
}

// ── HISTÓRICO VIEW ─────────────────────────────────────────────────────────────
function ciStatus(ci, pid){
  const sc=ci[pid]?.scale, ad=ci[pid]?.adherence;
  if(!sc) return {cls:"empty",label:"✗ vazio"};
  const keyScale=[sc.weight_kg,sc.fat_pct,sc.skeletal_muscle_pct,sc.visceral];
  const keyAdh=[ad?.diet_score,ad?.workouts_count];
  const nullCount=[...keyScale,...keyAdh].filter(v=>v==null).length;
  if(nullCount===0) return {cls:"full",label:"✓ completo"};
  if(nullCount<=3) return {cls:"partial",label:"⚠ parcial"};
  return {cls:"empty",label:"✗ incompleto"};
}

          </div>

function buildHistEditForm(ci, idx){
  const d=HEALTH_DATA.pessoas.davidson, i=HEALTH_DATA.pessoas.isabella;
  const dsc=ci.davidson?.scale||{}, dad=ci.davidson?.adherence||{}, dsy=ci.davidson?.symptoms||{};
  const isc=ci.isabella?.scale||{}, iad=ci.isabella?.adherence||{}, isy=ci.isabella?.symptoms||{};

  const inp=(id,val,type="number",step=".1",ph="")=>{

function toggleHist(idx){
  const body=document.getElementById(`hbody-${idx}`);
  const chev=document.getElementById(`chev-${idx}`);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}

function getHV(idx, key, fallback=null){
  const el=document.getElementById(`he-${idx}-${key}`);
  if(!el) return fallback;
  const v=el.value.trim();
  if(v===""||v==="null") return null;
  if(v==="true") return true;
  if(v==="false") return false;
  const n=parseFloat(v);
  return isNaN(n)?v:n;
}

async function generateHistJSON(idx, date){
  const d=HEALTH_DATA.pessoas.davidson, i=HEALTH_DATA.pessoas.isabella;
  const prev=HEALTH_DATA.checkins[idx];
  const tr=(cur,old)=>cur==null||old==null?"=":cur<old?"↓":cur>old?"↑":"=";
  const pp=idx>0?HEALTH_DATA.checkins[idx-1]:null;

  const buildSc=(pid)=>{
    const pre=pp?pp[pid]?.scale:{};
    const w=getHV(idx,`${pid[0]}-w`), f=getHV(idx,`${pid[0]}-f`),
          m=getHV(idx,`${pid[0]}-m`), v=getHV(idx,`${pid[0]}-v`);
    return {
      scale:{weight_kg:w,fat_pct:f,skeletal_muscle_pct:m,visceral:v,
             bmi:getHV(idx,`${pid[0]}-bmi`),water_pct:getHV(idx,`${pid[0]}-wat`),bmr_kcal:getHV(idx,`${pid[0]}-bmr`)},
      trend:{weight:tr(w,pre?.weight_kg),fat:tr(f,pre?.fat_pct),muscle:tr(m,pre?.skeletal_muscle_pct),visceral:tr(v,pre?.visceral)},
    };
  };

  const dS=buildSc("davidson"), iS=buildSc("isabella");
  const dSym=Object.fromEntries(Object.keys(d.symptoms_schema).map(k=>[k,getHV(idx,`d-s-${k}`)??0]));
  const iSym=Object.fromEntries(Object.keys(i.symptoms_schema).map(k=>[k,getHV(idx,`i-s-${k}`)??0]));

  const payload={
    _action:"update_checkin",
    date, week_number:prev.week_number,
    davidson:{...dS,
      adherence:{diet_score:getHV(idx,"d-diet"),workouts_count:getHV(idx,"d-wkt"),notes:getHV(idx,"d-notes",""),medication_on_time:getHV(idx,"d-med")},
      symptoms:{...dSym,other:""}},
    isabella:{...iS,
      adherence:{diet_score:getHV(idx,"i-diet"),workouts_count:getHV(idx,"i-wkt"),notes:getHV(idx,"i-notes",""),medication_on_time:getHV(idx,"i-med")},
      symptoms:{...iSym,other:""}},
    summary:{what_worked:getHV(idx,"sum-good",""),what_hindered:"",next_week_priority:getHV(idx,"sum-next","")}
  };

  const btn=document.querySelector(`#hbody-${idx} .btn-p`);
  if(btn){btn.textContent='⏳ Salvando...';btn.disabled=true;}
  const ok = await autoSave(payload);
  if(btn){btn.textContent='💾 Salvar';btn.disabled=false;}

  const outId=`hist-json-${idx}`;
  showSaveResult(outId, ok, JSON.stringify(payload,null,2));
  if(!ok) document.getElementById(`hist-copy-${idx}`).style.display="inline-block";
  document.getElementById(outId).scrollIntoView({behavior:"smooth"});
}

function copyHistJSON(idx){
  const btn=document.getElementById(`hist-copy-${idx}`);
  copyText(document.getElementById(`hist-json-${idx}`).textContent,btn);
}

async function saveNewExam(pid){
  const date=document.getElementById(`exf-date-${pid}`)?.value;
  const label=document.getElementById(`exf-label-${pid}`)?.value?.trim();
  const notes=document.getElementById(`exf-notes-${pid}`)?.value?.trim()||"";

  if(!date||!label){
    alert("Preencha a data e o nome do painel.");
    return;
  }

  const results=[];
  for(let i=0;i<(examFormRows[pid]||1);i++){
    const pre=`exr-${pid}-${i}`;
    const name=document.getElementById(`${pre}-name`)?.value?.trim();
    if(!name) continue;
    let val=document.getElementById(`${pre}-val`)?.value?.trim()||"";
    const numVal=parseFloat(val);
    results.push({
      name,
      value:isNaN(numVal)?val:numVal,
      unit:document.getElementById(`${pre}-unit`)?.value?.trim()||"",
      ref:document.getElementById(`${pre}-ref`)?.value?.trim()||"",
      status:document.getElementById(`${pre}-st`)?.value||"ok"
    });
  }

  if(!results.length){
    alert("Adicione pelo menos um marcador.");
    return;
  }

  const payload={
    _action:"new_exam",
    person:pid,
    exam:{ date, label, results, notes }
  };

  const btn=document.querySelector(`#exam-form-${pid} .btn-p`);
  if(btn){btn.textContent='⏳ Salvando...';btn.disabled=true;}
  const ok = await autoSave(payload);
  if(btn){btn.textContent='💾 Salvar exame';btn.disabled=false;}

  const outId=`exf-json-${pid}`;
  showSaveResult(outId, ok, JSON.stringify(payload,null,2));
  if(!ok) document.getElementById(`exf-copy-${pid}`).style.display="inline-block";
}

  const date=document.getElementById(`exe-date-${eid}`)?.value;
  const label=document.getElementById(`exe-label-${eid}`)?.value?.trim();
  const notes=document.getElementById(`exe-notes-${eid}`)?.value?.trim()||"";

  if(!date||!label){ alert("Preencha data e nome."); return; }

  const rowCount=editExamRowCounts[eid]||(HEALTH_DATA.exams[pid][origIdx]?.results?.length||0);
  const results=[];
  for(let i=0;i<rowCount;i++){
    const pre=`exre-${eid}-${i}`;
    const name=document.getElementById(`${pre}-name`)?.value?.trim();
    if(!name) continue;
    let val=document.getElementById(`${pre}-val`)?.value?.trim()||"";
    const numVal=parseFloat(val);
    results.push({
      name,
      value:isNaN(numVal)?val:numVal,
      unit:document.getElementById(`${pre}-unit`)?.value?.trim()||"",
      ref:document.getElementById(`${pre}-ref`)?.value?.trim()||"",
      status:document.getElementById(`${pre}-st`)?.value||"ok"
    });
  }

  const payload={
    _action:"update_exam",
    person:pid,
    exam_index:origIdx,
    exam:{ date, label, results, notes }
  };

  const btn=document.querySelector(`#exam-edit-${eid} .btn-p`);
  if(btn){btn.textContent='⏳ Salvando...';btn.disabled=true;}
  const ok = await autoSave(payload);
  if(btn){btn.textContent='💾 Salvar';btn.disabled=false;}

  const outId=`exe-json-${eid}`;
  showSaveResult(outId, ok, JSON.stringify(payload,null,2));
  if(!ok) document.getElementById(`exe-copy-${eid}`).style.display="inline-block";
}

const sectionRowCounts={};

function toggleSection(id){
  const v=document.getElementById(`${id.split('-').slice(0,-1).join('-')}-view-${id.split('-').pop()}`);
  const e=document.getElementById(`${id.split('-').slice(0,-1).join('-')}-edit-${id.split('-').pop()}`);
  // Simpler: parse prefix and pid
  const parts=id.lastIndexOf('-');
  const prefix=id.substring(0,parts);
  const pid=id.substring(parts+1);
  const viewEl=document.getElementById(`${prefix}-view-${pid}`);
  const editEl=document.getElementById(`${prefix}-edit-${pid}`);
  if(!viewEl||!editEl) return;
  const isEditing=editEl.style.display!=="none";
  viewEl.style.display=isEditing?"block":"none";
  editEl.style.display=isEditing?"none":"block";
}

const built={};

function setTab(tid){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("tab-"+tid).classList.add("active");
  document.getElementById("view-"+tid).classList.add("active");
  if(!built[tid]){
    built[tid]=true;
    if(tid==="davidson") buildPersonView("davidson");
    if(tid==="isabella") buildPersonView("isabella");
    if(tid==="casal")    buildCasalView();
    if(tid==="historico") buildHistoricoView();
    if(tid==="checkin")  buildCheckinView();
    if(tid==="exames")   buildExamsView();
  }
}
