# Brand Profile — Evolution Foundation
# SEED DATA: criado manualmente com dados da tela de referência
# Para novas brands, usar o workflow setup (NB)
name: "Evolution Foundation"
language: "Português"
country: "Brasil"
description: >
  A Evolution Foundation é um ecossistema brasileiro de tecnologia
  criado para democratizar o acesso à automação, integração de sistemas
  e inteligência artificial no dia a dia de empresas e profissionais.
  Reunimos soluções, conhecimento e comunidade para ajudar pequenas e médias
  empresas, agências, desenvolvedores e operações digitais a centralizar canais,
  automatizar processos, escalar atendimento e aplicar IA de forma prática.
  Nosso foco é transformar tecnologias antes complexas ou restritas em ferramentas
  acessíveis, flexíveis e úteis para negócios reais, conectando pessoas, sistemas
  e oportunidades de crescimento.

