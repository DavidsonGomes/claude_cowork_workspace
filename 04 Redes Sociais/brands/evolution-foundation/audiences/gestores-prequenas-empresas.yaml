# Audience: Gestores de pequenas empresas
name: "Gestores de pequenas empresas"
icon: "💻"

problems:
  - "Perde leads por demora no atendimento"
  - "Atendimento fica preso no WhatsApp pessoal ou em processos manuais"
  - "Equipe pequena para dar conta do volume de mensagens"
  - "Falta integração entre WhatsApp, Instagram, e-mail e CRM"
  - "Dificuldade para escalar vendas e suporte sem contratar mais gente"
  - "Processos repetitivos consomem tempo da operação"
  - "Falta visibilidade sobre funil, conversas e desempenho da equipe"
  - "Muitas ferramentas separadas e mal conectadas"
  - "Depende demais de pessoas-chave para operar o negócio"
  - "Quer usar IA, mas não sabe por onde começar"
  - "Tem medo de investir em tecnologia errada"
  - "Perde oportunidades por falta de follow-up"
  - "Atendimento desorganizado gera má experiência para o cliente"
  - "Dificuldade para padronizar comunicação da empresa"
  - "Crescimento trava por falta de automação"
  - "Soluções atuais são caras, limitadas ou engessadas"
  - "Não consegue centralizar canais de comunicação"
  - "Falta controle sobre jornadas de atendimento e vendas"
  - "Quer inovar, mas sem aumentar muito o custo operacional"
  - "Tem receio de ficar dependente de plataformas fechadas"

solutions:
  - "Contratar mais atendentes manualmente"
  - "Usar WhatsApp Business de forma manual"
  - "Organizar atendimento em planilhas"
  - "Usar CRM tradicional sem integração real com canais"
  - "Contratar agência ou consultoria de automação"
  - "Usar chatbot simples e limitado"
  - "Integrar ferramentas via N8N ou Make"
  - "Usar múltiplas plataformas separadas para cada canal"
  - "Adotar uma plataforma de atendimento omnichannel"
  - "Implantar automação de atendimento com IA"
  - "Usar agentes de IA para qualificação e suporte"
  - "Centralizar canais em uma única operação"
  - "Estruturar funis, pipelines e follow-ups automáticos"
  - "Integrar CRM, atendimento e automações em uma só stack"
  - "Criar jornadas inteligentes de vendas e suporte"
  - "Implantar uma solução white label para revenda ou operação própria"
  - "Utilizar a Evolution para integrar canais, automação e IA"
  - "Usar a Evolution com fluxos conectados a ferramentas como N8N"
  - "Criar atendimento híbrido entre humano + IA"
  - "Usar dashboards e métricas para otimizar a operação"

objections:
  - "Isso parece complexo demais para minha empresa"
  - "Não tenho equipe técnica para implementar"
  - "Tenho medo de depender de automação e perder o toque humano"
  - "IA ainda parece confusa ou arriscada"
  - "Já testei outras ferramentas e não funcionou"
  - "Não sei se isso vale o investimento"
  - "Minha empresa ainda é pequena demais para isso"
  - "Tenho medo de quebrar a operação atual"
  - "Parece coisa para empresa grande"
  - "Não quero ficar preso a uma plataforma"
  - "Tenho receio com estabilidade e suporte"
  - "Não sei quanto tempo leva para dar resultado"
  - "Minha equipe pode resistir à mudança"
  - "Já usamos várias ferramentas e trocar tudo dá trabalho"
  - "Tenho medo de complicar mais do que ajudar"
  - "Não sei se integra com o que eu já uso"
  - "Automação pode deixar o atendimento frio"
  - "IA pode responder errado e prejudicar a marca"
  - "Não tenho tempo para aprender uma ferramenta nova"
  - "Preciso de algo simples, não de um sistema gigante"
